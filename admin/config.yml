backend:
  name: github
  repo: JeSuisThomas/melini-site
  branch: main
  base_url: https://melini-site.vercel.app
  auth_endpoint: /api/auth

media_folder: "images/uploads"
public_folder: "/images/uploads"
media_library:
  name: default
  config:
    multiple: true

locale: "fr"

collections:
  - name: "site"
    label: "Contenu du site"
    files:
      - name: "general"
        label: "Contenu principal"
        file: "content/site.json"
        fields:
          - label: "Hero (page d'accueil)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Image de fond", name: "image", widget: "image", required: true }
              - { label: "Titre principal", name: "titre", widget: "string", default: "Chaque pied est unique" }
              - { label: "Sous-titre", name: "sous_titre", widget: "string", default: "Melini · Chaussures & sacs femme" }

          - label: "Bandeau (barre rose)"
            name: "bandeau"
            widget: "object"
            fields:
              - { label: "Texte du bandeau", name: "texte", widget: "string", default: "Nouvelle collection printemps-été 2026 · Disponible en boutique" }

          - label: "Notre histoire"
            name: "histoire"
            widget: "object"
            fields:
              - { label: "Photo", name: "image", widget: "image", required: true }

          - label: "Photos collection (carrousel)"
            name: "collection"
            widget: "object"
            fields:
              - label: "Photos"
                name: "photos"
                widget: "list"
                summary: "{{fields.alt}}"
                fields:
                  - { label: "Image", name: "image", widget: "image", media_library: { config: { multiple: true } } }
                  - { label: "Description courte", name: "alt", widget: "string", default: "Photo collection Melini" }

          - label: "Horaires"
            name: "horaires"
            widget: "object"
            fields:
              - { label: "Lundi", name: "lundi", widget: "string", default: "14h00 · 18h30" }
              - { label: "Mardi à Samedi", name: "mardi_samedi", widget: "string", default: "10h00 · 18h30" }
              - { label: "Dimanche", name: "dimanche", widget: "string", default: "Fermé" }
