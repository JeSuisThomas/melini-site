<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Melini — Shoes &amp; Bags">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;family=Outfit:wght@300&amp;display=swap');
      .wordmark { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 48px; letter-spacing: 12px; fill: #1A1A1A; }
      .tagline  { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 6px; fill: #7A6B63; text-transform: uppercase; }
      .place    { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 300; font-size: 14px; letter-spacing: 1px; fill: #D4A99A; }
    </style>
  </defs>
  <rect x="1" y="1" width="318" height="318" fill="#F5EDE8" stroke="#D4A99A" stroke-width="0.5"/>
  <text x="160" y="150" text-anchor="middle" class="wordmark">MELINI</text>
  <line x1="130" y1="172" x2="190" y2="172" stroke="#D4A99A" stroke-width="1"/>
  <text x="160" y="196" text-anchor="middle" class="tagline">SHOES &amp; BAGS</text>
  <text x="160" y="232" text-anchor="middle" class="place">Uccle, Bruxelles</text>
