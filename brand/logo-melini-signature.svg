      .wordmark { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; font-size: 56px; letter-spacing: 14px; fill: #1A1A1A; }
      .signature { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; font-weight: 300; font-size: 18px; letter-spacing: 1px; fill: #7A6B63; }
    </style>
  </defs>
  <text x="300" y="74" text-anchor="middle" class="wordmark">MELINI</text>
